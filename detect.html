<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fake Account Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>FAKE ACCOUNT DETECTION</h1>
<p class="tagline">Instagram Fake Profile Warning System</p>

<div class="card">
    <input type="text" id="username" placeholder="Username">
    <input type="number" id="followers" placeholder="Followers Count">
    <input type="number" id="age" placeholder="Account Age (months)">
    <textarea id="bio" placeholder="Account Bio"></textarea>

    <button onclick="checkAccount()">ANALYZE ACCOUNT</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
